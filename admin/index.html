<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigantVPN Admin — Поддержка</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-box {
            background: rgba(20, 20, 35, 0.9);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 40px 32px;
            width: 100%;
            max-width: 360px;
            text-align: center;
        }
        .login-box h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .login-box p { font-size: 13px; color: #666; margin-bottom: 24px; }
        .login-box input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: white;
            font-size: 15px;
            outline: none;
            margin-bottom: 16px;
            text-align: center;
        }
        .login-box input:focus { border-color: rgba(0,212,255,0.3); }
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #00D4FF, #0080FF);
            color: #000;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn:hover { opacity: 0.9; }
        .error { color: #ff6b6b; font-size: 13px; margin-top: 8px; }
        .admin-panel { display: none; height: 100vh; }
        .header {
            padding: 16px 20px;
            background: rgba(15,15,25,0.95);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 { font-size: 18px; font-weight: 700; }
        .header .logout {
            background: none;
            border: none;
            color: #666;
            font-size: 13px;
            cursor: pointer;
        }
        .layout { display: flex; height: calc(100vh - 57px); }
        .ticket-list {
            width: 320px;
            border-right: 1px solid rgba(255,255,255,0.06);
            overflow-y: auto;
            flex-shrink: 0;
        }
        .ticket-item {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            cursor: pointer;
            transition: background 0.15s;
        }
        .ticket-item:hover { background: rgba(255,255,255,0.03); }
        .ticket-item.active { background: rgba(0,212,255,0.08); border-left: 3px solid #00D4FF; }
        .ticket-item .subject {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .ticket-item .meta {
            font-size: 12px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-open { background: #00D4FF; }
        .status-in_progress { background: #FFD700; }
        .status-closed { background: #666; }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .chat-header {
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: rgba(15,15,25,0.5);
        }
        .chat-header .ticket-subject { font-size: 15px; font-weight: 600; }
        .chat-header .ticket-meta { font-size: 12px; color: #666; margin-top: 2px; }
        .chat-header .actions { display: flex; gap: 8px; margin-top: 8px; }
        .chat-header .actions button {
            padding: 6px 12px;
            border-radius: 8px;
            border: none;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-reply { background: linear-gradient(135deg, #00D4FF, #0080FF); color: #000; }
        .btn-close { background: rgba(255,107,107,0.15); color: #ff6b6b; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .msg {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }
        .msg-user {
            align-self: flex-start;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .msg-admin {
            align-self: flex-end;
            background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(0,128,255,0.1));
            border: 1px solid rgba(0,212,255,0.2);
        }
        .msg .time { font-size: 11px; color: #666; margin-top: 4px; }
        .msg-user .sender { font-size: 11px; color: #00D4FF; margin-bottom: 4px; }
        .input-area {
            padding: 12px 20px;
            border-top: 1px solid rgba(255,255,255,0.06);
            display: flex;
            gap: 8px;
            background: rgba(15,15,25,0.95);
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: white;
            font-size: 14px;
            outline: none;
        }
        .input-area input:focus { border-color: rgba(0,212,255,0.3); }
        .input-area button {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #00D4FF, #0080FF);
            color: #000;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 14px;
        }
        .log { padding: 10px; font-size: 11px; color: #666; background: rgba(255,255,255,0.02); border-radius: 8px; margin: 8px 0; max-height: 100px; overflow-y: auto; font-family: monospace; }
    </style>
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1>GigantVPN Admin</h1>
            <p>Введите ваш Telegram ID</p>
            <input type="text" id="adminIdInput" placeholder="8954318576" inputmode="numeric">
            <div class="error" id="loginError"></div>
            <div class="log" id="log"></div>
            <button class="btn" onclick="login()">Войти</button>
        </div>
    </div>

    <div class="admin-panel" id="adminPanel">
        <div class="header">
            <h1>GigantVPN — Поддержка</h1>
            <button class="logout" onclick="logout()">Выйти</button>
        </div>
        <div class="layout">
            <div class="ticket-list" id="ticketList"></div>
            <div class="chat-area" id="chatArea">
                <div class="empty-state" id="emptyState">Выберите обращение</div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_ID = 8954318576;
        const URL = 'https://ijgzostzqpowlyllssjb.supabase.co';
        const KEY = 'sb_publishable__360GidmIYq8uYh6tfhjPw_POKDNDxf';
        const HEADERS = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json' };

        let currentTicket = null;

        function log(msg) {
            const el = document.getElementById('log');
            el.textContent += msg + '\n';
            el.scrollTop = el.scrollHeight;
        }

        async function api(method, table, params, body) {
            let url = URL + '/rest/v1/' + table;
            if (params) url += '?' + params;
            const opts = { method, headers: HEADERS };
            if (body) opts.body = JSON.stringify(body);
            const r = await fetch(url, opts);
            if (!r.ok) { const e = await r.json(); throw new Error(e.message || r.status); }
            const ct = r.headers.get('content-type') || '';
            if (ct.includes('json')) return r.json();
            return null;
        }

        async function login() {
            const input = document.getElementById('adminIdInput').value.trim();
            const id = parseInt(input);
            document.getElementById('loginError').textContent = '';
            document.getElementById('log').textContent = '';

            if (!id) { document.getElementById('loginError').textContent = 'Введите ID'; return; }
            if (id !== ADMIN_ID) { document.getElementById('loginError').textContent = 'Неверный ID'; return; }

            log('Проверка доступа...');
            try {
                await api('GET', 'support_tickets', 'limit=1');
                log('Доступ получен!');
                localStorage.setItem('admin_id', id);
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadTickets();
            } catch (e) {
                log('Ошибка: ' + e.message);
                document.getElementById('loginError').textContent = 'Ошибка подключения: ' + e.message;
            }
        }

        function logout() {
            localStorage.removeItem('admin_id');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('adminPanel').style.display = 'none';
        }

        async function loadTickets() {
            try {
                const data = await api('GET', 'support_tickets', 'order=updated_at.desc');
                renderTickets(data || []);
            } catch (e) {
                console.error('Load error:', e);
            }
        }

        function renderTickets(tickets) {
            const list = document.getElementById('ticketList');
            list.innerHTML = tickets.map(t => {
                const s = { open: 'Открыто', in_progress: 'В работе', closed: 'Закрыто' }[t.status] || t.status;
                const d = new Date(t.updated_at).toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
                return '<div class="ticket-item ' + (currentTicket && currentTicket.id === t.id ? 'active' : '') + '" onclick="selectTicket(' + t.id + ')">' +
                    '<div class="subject">' + esc(t.subject) + '</div>' +
                    '<div class="meta"><span class="status-dot status-' + t.status + '"></span><span>' + s + '</span><span>·</span><span>' + d + '</span></div>' +
                    '<div class="meta" style="margin-top:2px"><span>User #' + t.user_id + '</span></div>' +
                    '</div>';
            }).join('');
        }

        async function selectTicket(id) {
            try {
                const tickets = await api('GET', 'support_tickets', 'id=eq.' + id);
                const ticket = tickets[0];
                if (!ticket) return;
                currentTicket = ticket;

                const messages = await api('GET', 'support_messages', 'ticket_id=eq.' + id + '&order=created_at.asc');

                // Mark admin messages as read
                await api('PATCH', 'support_messages', 'ticket_id=eq.' + id + '&sender=eq.admin&is_read=is.false', { is_read: true });

                renderTickets(await api('GET', 'support_tickets', 'order=updated_at.desc'));
                renderChat(ticket, messages || []);
            } catch (e) {
                console.error('Select error:', e);
            }
        }

        function renderChat(ticket, messages) {
            const area = document.getElementById('chatArea');
            const st = { open: 'Открыто', in_progress: 'В работе', closed: 'Закрыто' }[ticket.status];
            const closed = ticket.status === 'closed';

            let html = '<div class="chat-header">' +
                '<div class="ticket-subject">' + esc(ticket.subject) + '</div>' +
                '<div class="ticket-meta">User #' + ticket.user_id + ' · ' + st + '</div>' +
                (closed ? '' : '<div class="actions"><button class="btn-close" onclick="closeTicket(' + ticket.id + ')">Закрыть</button></div>') +
                '</div>';

            html += '<div class="messages" id="msgs">';
            messages.forEach(m => {
                const time = new Date(m.created_at).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                const cls = m.sender === 'admin' ? 'msg-admin' : 'msg-user';
                html += '<div class="msg ' + cls + '">' +
                    (m.sender === 'user' ? '<div class="sender">Пользователь</div>' : '') +
                    '<div>' + esc(m.message) + '</div>' +
                    '<div class="time">' + time + '</div></div>';
            });
            html += '</div>';

            if (!closed) {
                html += '<div class="input-area">' +
                    '<input type="text" id="msgInput" placeholder="Ваш ответ..." onkeydown="if(event.key===\'Enter\')sendReply()">' +
                    '<button onclick="sendReply()">→</button></div>';
            } else {
                html += '<div style="padding:12px 20px;text-align:center;color:#666;font-size:13px;border-top:1px solid rgba(255,255,255,0.06)">Обращение закрыто</div>';
            }

            area.innerHTML = html;
            const msgs = document.getElementById('msgs');
            if (msgs) msgs.scrollTop = msgs.scrollHeight;
        }

        async function sendReply() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text || !currentTicket) return;
            input.value = '';

            try {
                await api('POST', 'support_messages', null, {
                    ticket_id: currentTicket.id,
                    sender: 'admin',
                    message: text,
                    telegram_id: 0
                });
                await api('PATCH', 'support_tickets', 'id=eq.' + currentTicket.id, { status: 'in_progress' });
                selectTicket(currentTicket.id);
            } catch (e) {
                console.error('Send error:', e);
            }
        }

        async function closeTicket(id) {
            if (!confirm('Закрыть обращение?')) return;
            try {
                await api('PATCH', 'support_tickets', 'id=eq.' + id, { status: 'closed' });
                if (currentTicket && currentTicket.id === id) { currentTicket.status = 'closed'; selectTicket(id); }
                loadTickets();
            } catch (e) { console.error('Close error:', e); }
        }

        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        // Auto-login
        if (localStorage.getItem('admin_id') === String(ADMIN_ID)) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadTickets();
        }
    </script>
</body>
</html>
