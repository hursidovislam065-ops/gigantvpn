<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GigantVPN</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #050810; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; min-height: 100vh; overflow-x: hidden; position: relative; }

    .animated-bg {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -2;
      background: 
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(0, 212, 255, 0.18), transparent 50%),
        radial-gradient(ellipse 60% 40% at 80% 30%, rgba(0, 180, 150, 0.15), transparent 50%),
        radial-gradient(ellipse 50% 50% at 50% 100%, rgba(0, 100, 200, 0.12), transparent 50%),
        linear-gradient(180deg, #050810 0%, #0A0E1A 50%, #0F1420 100%);
      animation: bgFlow 20s ease-in-out infinite;
    }
    @keyframes bgFlow {
      0%, 100% { 
        background: 
          radial-gradient(ellipse 80% 50% at 20% 0%, rgba(0, 212, 255, 0.18), transparent 50%),
          radial-gradient(ellipse 60% 40% at 80% 30%, rgba(0, 180, 150, 0.15), transparent 50%),
          radial-gradient(ellipse 50% 50% at 50% 100%, rgba(0, 100, 200, 0.12), transparent 50%),
          linear-gradient(180deg, #050810 0%, #0A0E1A 50%, #0F1420 100%);
      }
      33% { 
        background: 
          radial-gradient(ellipse 80% 50% at 70% 20%, rgba(0, 212, 255, 0.22), transparent 50%),
          radial-gradient(ellipse 60% 40% at 20% 60%, rgba(0, 180, 150, 0.18), transparent 50%),
          radial-gradient(ellipse 50% 50% at 80% 80%, rgba(0, 100, 200, 0.15), transparent 50%),
          linear-gradient(180deg, #050810 0%, #0A0E1A 50%, #0F1420 100%);
      }
      66% { 
        background: 
          radial-gradient(ellipse 80% 50% at 40% 30%, rgba(0, 212, 255, 0.2), transparent 50%),
          radial-gradient(ellipse 60% 40% at 90% 70%, rgba(0, 180, 150, 0.16), transparent 50%),
          radial-gradient(ellipse 50% 50% at 10% 90%, rgba(0, 100, 200, 0.14), transparent 50%),
          linear-gradient(180deg, #050810 0%, #0A0E1A 50%, #0F1420 100%);
      }
    }

    .particles { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1; pointer-events: none; overflow: hidden; }
    .particle { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; opacity: 0.3; box-shadow: 0 0 4px rgba(0, 212, 255, 0.6); animation: float linear infinite; }
    @keyframes float {
      0% { transform: translateY(100vh) translateX(0); opacity: 0; }
      10% { opacity: 0.7; }
      90% { opacity: 0.7; }
      100% { transform: translateY(-10vh) translateX(30px); opacity: 0; }
    }

    .glass {
      background: linear-gradient(135deg, rgba(19, 24, 38, 0.7) 0%, rgba(26, 32, 48, 0.3) 100%);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }
    .glass-pro {
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.12) 0%, rgba(0, 180, 150, 0.05) 50%, rgba(0, 128, 255, 0.04) 100%);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1.5px solid rgba(0, 212, 255, 0.4);
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(0, 212, 255, 0.2), inset 0 1px 0 rgba(0, 212, 255, 0.2);
      position: relative;
      overflow: hidden;
    }
    .glass-pro::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: linear-gradient(45deg, transparent, rgba(0, 212, 255, 0.1), transparent);
      animation: shine 4s linear infinite;
    }
    @keyframes shine {
      0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
      100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
    }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 30px rgba(0, 212, 255, 0.4); } 50% { box-shadow: 0 0 50px rgba(0, 212, 255, 0.7); } }
    @keyframes floatY { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .anim-up { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) backwards; }
    .anim-pulse { animation: pulse 2.5s ease-in-out infinite; }
    .anim-glow { animation: glow 3s ease-in-out infinite; }
    .anim-float { animation: floatY 3s ease-in-out infinite; }

    .text-accent { color: #00D4FF; }
    .text-gray { color: #8B95A7; }

    .btn-back {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: white; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s;
    }
    .btn-back:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.05); }

    .icon-card {
      background: linear-gradient(145deg, rgba(19, 24, 38, 0.6) 0%, rgba(26, 32, 48, 0.3) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    .icon-card:hover {
      transform: translateY(-4px);
      border-color: rgba(0, 212, 255, 0.2);
      box-shadow: 0 8px 40px rgba(0, 212, 255, 0.1);
    }
    .icon-card:active { transform: scale(0.95); }

    .icon-card .icon-wrap {
      width: 56px;
      height: 56px;
      margin: 0 auto 12px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    .icon-card .icon-wrap.purple { 
      background: linear-gradient(135deg, rgba(120, 80, 255, 0.2), rgba(120, 80, 255, 0.05)); 
      border: 1px solid rgba(120, 80, 255, 0.2); 
    }
    .icon-card .icon-wrap.blue { 
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 212, 255, 0.05)); 
      border: 1px solid rgba(0, 212, 255, 0.2); 
    }
    .icon-card .card-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .icon-card .card-sub { font-size: 11px; opacity: 0.4; }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      background: rgba(10, 14, 26, 0.85);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-top: 1px solid rgba(255,255,255,0.04);
      padding: 8px 0 14px;
    }
    .bottom-nav .nav-inner {
      max-width: 400px; margin: 0 auto;
      display: flex; justify-content: space-around;
    }
    .bottom-nav .nav-btn {
      background: none; border: none;
      display: flex; flex-direction: column; align-items: center;
      gap: 2px; cursor: pointer;
      color: #6E7A8A;
      transition: all 0.3s;
      padding: 4px 16px;
      position: relative;
      min-width: 56px;
    }
    .bottom-nav .nav-btn .nav-icon {
      font-size: 22px;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .bottom-nav .nav-btn .nav-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    .bottom-nav .nav-btn.active {
      color: #00D4FF;
    }
    .bottom-nav .nav-btn.active .nav-icon {
      transform: scale(1.15) translateY(-2px);
    }
    .bottom-nav .nav-btn.active::after {
      content: '';
      position: absolute;
      top: -4px;
      width: 20px;
      height: 3px;
      border-radius: 4px;
      background: linear-gradient(90deg, #00D4FF, #0080FF);
      box-shadow: 0 0 12px rgba(0,212,255,0.5);
    }

    .btn-primary {
      width: 100%; padding: 16px 20px; font-size: 15px; font-weight: 700;
      background: linear-gradient(135deg, #00D4FF 0%, #0080FF 50%, #00D4FF 100%);
      background-size: 200% 200%;
      color: #000;
      border: none; border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(0, 212, 255, 0.35);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      animation: btnGrad 3s ease-in-out infinite;
      position: relative;
      overflow: hidden;
    }
    .btn-primary:active { transform: scale(0.95); }
    @keyframes btnGrad {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .btn-primary .shimmer {
      position: absolute; top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transform: skewX(-25deg);
      animation: shimmer 3.5s ease-in-out infinite;
    }
    @keyframes shimmer {
      0% { left: -100%; }
      100% { left: 200%; }
    }

    .btn-secondary {
      width: 100%; padding: 16px 20px; font-size: 15px; font-weight: 600;
      background: rgba(19, 24, 38, 0.4);
      border: 1.5px solid rgba(0, 212, 255, 0.35);
      color: #00D4FF;
      border-radius: 16px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }
    .btn-secondary:active { transform: scale(0.95); }

    .nav-item-row {
      width: 100%; padding: 14px 16px; background: transparent;
      border: none; border-radius: 14px; color: white;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer; text-align: left; transition: all 0.3s;
    }
    .nav-item-row:hover { background: rgba(0, 212, 255, 0.05); }
    .nav-item-row:active { transform: scale(0.98); }

    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #2a2f45;
      border-radius: 12px;
      transition: 0.3s;
    }
    .toggle-slider.active {
      background: #00D4FF;
      box-shadow: 0 0 20px rgba(0,212,255,0.3);
    }
    .toggle-slider:before {
      content: '';
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }
    .toggle-slider.active:before {
      transform: translateX(20px);
    }
  </style>
</head>
<body>
  <div class="animated-bg"></div>
  <div class="particles" id="particles"></div>
  <div id="root"></div>
  <script>
    const pEl = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDelay = Math.random() * 8 + 's';
      p.style.animationDuration = (8 + Math.random() * 6) + 's';
      pEl.appendChild(p);
    }
  </script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ===== КОНФИГ API =====
    const API_URL = 'http://localhost:8000/api';
    const USER_TELEGRAM_ID = 123456789;

    // ===== НИЖНЯЯ ПАНЕЛЬ =====
    function BottomNav({current, onChange}) {
      const items = [
        {id: 'home', icon: '🏠', label: 'Главная'},
        {id: 'referral', icon: '🎁', label: 'Рефералы'},
        {id: 'support', icon: '🎧', label: 'Поддержка'},
        {id: 'settings', icon: '⚙️', label: 'Настройки'},
      ];
      return (
        <nav className="bottom-nav">
          <div className="nav-inner">
            {items.map((item) => (
              <button
                key={item.id}
                className={'nav-btn' + (current === item.id ? ' active' : '')}
                onClick={() => onChange(item.id)}
              >
                <span className="nav-icon">{item.icon}</span>
                <span className="nav-label">{item.label}</span>
              </button>
            ))}
          </div>
        </nav>
      );
    }

    // ===== ГЛАВНАЯ =====
    function Home({onPay, onSettings, onInvite, onSupport, onVpnSetup, userData, onRefresh}) {
      const [localUserData, setLocalUserData] = useState(userData);
      const [loading, setLoading] = useState(!userData);
      const [error, setError] = useState(null);

      useEffect(() => {
        if (userData) {
          setLocalUserData(userData);
          setLoading(false);
        }
      }, [userData]);

      useEffect(() => {
        if (!userData) {
          const fetchUser = async () => {
            try {
              const response = await fetch(`${API_URL}/users/${USER_TELEGRAM_ID}`);
              if (!response.ok) {
                if (response.status === 404) {
                  const registerRes = await fetch(`${API_URL}/users/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                      telegram_id: USER_TELEGRAM_ID,
                      username: 'telegram_user',
                      first_name: 'Пользователь'
                    })
                  });
                  if (registerRes.ok) {
                    const userRes = await fetch(`${API_URL}/users/${USER_TELEGRAM_ID}`);
                    const data = await userRes.json();
                    setLocalUserData(data);
                    if (onRefresh) onRefresh();
                  }
                }
              } else {
                const data = await response.json();
                setLocalUserData(data);
              }
            } catch (err) {
              setError(err.message);
            } finally {
              setLoading(false);
            }
          };
          fetchUser();
        }
      }, []);

      if (loading) {
        return (
          <div style={{padding: '20px 16px 100px', minHeight: '100vh'}}>
            <div style={{maxWidth: '400px', margin: '0 auto', textAlign: 'center', paddingTop: '100px'}}>
              <div style={{fontSize: '48px', marginBottom: '16px'}}>⏳</div>
              <p style={{fontSize: '16px', opacity: 0.6}}>Загрузка...</p>
            </div>
          </div>
        );
      }

      if (error) {
        return (
          <div style={{padding: '20px 16px 100px', minHeight: '100vh'}}>
            <div style={{maxWidth: '400px', margin: '0 auto', textAlign: 'center', paddingTop: '100px'}}>
              <div style={{fontSize: '48px', marginBottom: '16px'}}>❌</div>
              <p style={{fontSize: '16px', opacity: 0.6}}>Ошибка: {error}</p>
              <button onClick={() => window.location.reload()} style={{padding: '12px 24px', borderRadius: '12px', background: '#00D4FF', color: '#000', border: 'none', cursor: 'pointer', marginTop: '16px'}}>Обновить</button>
            </div>
          </div>
        );
      }

      const balance = localUserData?.balance || 0;
      const subscriptionUntil = localUserData?.subscription_until;
      const isSubscribed = subscriptionUntil && new Date(subscriptionUntil) > new Date();

      return (
        <div style={{padding: '20px 16px 100px', minHeight: '100vh'}}>
          <div style={{maxWidth: '400px', margin: '0 auto'}}>
            <div className="glass-pro anim-up" style={{padding: '32px 20px', marginBottom: '12px', textAlign: 'center'}}>
              <div className="anim-float" style={{width: '72px', height: '72px', margin: '0 auto 12px', background: 'linear-gradient(135deg, #00D4FF, #0080FF)', borderRadius: '22px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '36px', fontWeight: 'bold', color: 'black', boxShadow: '0 0 40px rgba(0, 212, 255, 0.5), 0 8px 20px rgba(0, 212, 255, 0.3)'}}>G</div>
              <h1 className="anim-up" style={{fontSize: '24px', fontWeight: 800, margin: '0 0 4px', letterSpacing: '-0.5px', animationDelay: '0.1s'}}>GigantVPN</h1>
              <p className="anim-up text-gray" style={{fontSize: '12px', margin: 0, animationDelay: '0.15s'}}>Быстрый и надёжный VPN</p>
            </div>

            <div className="glass anim-up" style={{padding: '20px', marginBottom: '12px', textAlign: 'center', animationDelay: '0.2s'}}>
              <p className="text-gray" style={{fontSize: '11px', marginBottom: '4px', textTransform: 'uppercase', letterSpacing: '1.5px'}}>Баланс</p>
              <p style={{fontSize: '36px', fontWeight: 800, margin: 0, background: 'linear-gradient(135deg, #fff, #8B95A7)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent'}}>{balance}₽</p>
            </div>

            <div className="glass anim-up" style={{padding: '16px 20px', marginBottom: '16px', animationDelay: '0.25s'}}>
              <div style={{display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '10px'}}>
                <span style={{fontSize: '16px'}}>{isSubscribed ? '✅' : '⚠️'}</span>
                <span style={{color: isSubscribed ? '#00E676' : '#FF6B6B', fontSize: '13px', fontWeight: 600}}>
                  {isSubscribed ? `Подписка до ${new Date(subscriptionUntil).toLocaleDateString()}` : 'Подписка истекла'}
                </span>
              </div>
              <div style={{display: 'flex', gap: '8px', flexWrap: 'wrap'}}>
                <span style={{background: 'rgba(255,255,255,0.04)', border: '1px solid rgba(255,255,255,0.06)', padding: '6px 12px', borderRadius: '20px', fontSize: '11px'}}>📱 {localUserData?.devices_count || 3} устройства</span>
                <span style={{background: 'rgba(255,255,255,0.04)', border: '1px solid rgba(255,255,255,0.06)', padding: '6px 12px', borderRadius: '20px', fontSize: '11px'}}>⚡ {localUserData?.network || 'LTE'}</span>
                <span style={{background: 'rgba(255,255,255,0.04)', border: '1px solid rgba(255,255,255,0.06)', padding: '6px 12px', borderRadius: '20px', fontSize: '11px'}}>∞ Безлимит</span>
              </div>
            </div>

            <button 
              onClick={() => onPay(localUserData?.id)} 
              className="btn-primary anim-up" 
              style={{animationDelay: '0.3s'}}
            >
              <span className="shimmer"></span>
              💳 Оплатить подписку
            </button>

            <button onClick={onVpnSetup} className="btn-secondary anim-up" style={{marginTop: '10px', animationDelay: '0.35s'}}>
              📱 Настроить VPN
            </button>

            <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', marginTop: '16px'}}>
              <div onClick={onInvite} className="icon-card anim-up" style={{animationDelay: '0.4s'}}>
                <div className="icon-wrap purple">👥</div>
                <div className="card-title">Пригласи друга</div>
                <div className="card-sub">Получи бонус</div>
              </div>
              <div onClick={onSupport} className="icon-card anim-up" style={{animationDelay: '0.45s'}}>
                <div className="icon-wrap blue">🎧</div>
                <div className="card-title">Поддержка</div>
                <div className="card-sub">Напишите нам</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ===== ПОДПИСКА =====
    function Subscription({onBack, userId, onPaymentSuccess}) {
      const [plans, setPlans] = useState([]);
      const [loading, setLoading] = useState(true);
      const [selectedPlan, setSelectedPlan] = useState(null);
      const [devices, setDevices] = useState(3);
      const [isProcessing, setIsProcessing] = useState(false);

      useEffect(() => {
        const fetchPlans = async () => {
          try {
            const response = await fetch(`${API_URL}/plans`);
            if (response.ok) {
              const data = await response.json();
              setPlans(data);
              if (data.length > 0) setSelectedPlan(data[0]);
            } else {
              // Заглушка, если API не отвечает
              const fallbackPlans = [
                {id: 1, name: '7 дней', price: 79, days: 7, badge: null, per_day: '11.3'},
                {id: 2, name: '1 месяц', price: 199, days: 30, badge: null, per_day: '6.6'},
                {id: 3, name: '3 месяца', price: 539, days: 90, badge: '−10%', per_day: '6.0'},
                {id: 4, name: '6 месяцев', price: 999, days: 180, badge: '−16%', per_day: '5.6'},
                {id: 5, name: '12 месяцев', price: 1799, days: 365, badge: '−25%', per_day: '4.9'},
              ];
              setPlans(fallbackPlans);
              setSelectedPlan(fallbackPlans[0]);
            }
          } catch (err) {
            console.error('Ошибка загрузки тарифов:', err);
          } finally {
            setLoading(false);
          }
        };
        fetchPlans();
      }, []);

      const handlePayment = async () => {
        if (!selectedPlan || !userId) {
          alert('Ошибка: выберите тариф');
          return;
        }

        setIsProcessing(true);
        try {
          const extraDevices = Math.max(0, devices - 3);
          const extraTotal = extraDevices * 50 * (selectedPlan.days / 30);
          const totalPrice = selectedPlan.price + extraTotal;

          const paymentRes = await fetch(`${API_URL}/payments/create`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              user_id: userId,
              amount: totalPrice,
              description: `Подписка ${selectedPlan.name}`
            })
          });

          if (!paymentRes.ok) {
            throw new Error('Ошибка создания платежа');
          }

          const paymentData = await paymentRes.json();
          
          const confirmRes = await fetch(`${API_URL}/payments/confirm/${paymentData.payment_id}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
          });

          if (confirmRes.ok) {
            alert('✅ Оплата успешно прошла! Подписка активирована.');
            if (onPaymentSuccess) onPaymentSuccess();
            onBack();
          } else {
            alert('❌ Ошибка подтверждения платежа');
          }

        } catch (err) {

    function Settings({onBack, onDocuments, onSubscription, onDevices, userData, onRefresh}) {
      const [email, setEmail] = useState('');
      const [isEmailLinked, setIsEmailLinked] = useState(false);
      const [showEmailInput, setShowEmailInput] = useState(false);
      const [notifications, setNotifications] = useState(true);
      const [loading, setLoading] = useState(false);

      useEffect(() => {
        if (userData?.email) {
          setEmail(userData.email);
          setIsEmailLinked(true);
        }
      }, [userData]);

      const handleLinkEmail = async () => {
        if (!email || !email.includes('@')) {
          alert('Введите корректный email');
          return;
        }
        setLoading(true);
        try {
          const response = await fetch(`${API_URL}/users/link-email`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              telegram_id: USER_TELEGRAM_ID,
              email: email
            })
          });
          if (response.ok) {
            setIsEmailLinked(true);
            setShowEmailInput(false);
            alert('✅ Email успешно привязан!');
            if (onRefresh) onRefresh();
          } else {
            alert('❌ Ошибка привязки email');
          }
        } catch (err) {
          alert('❌ Ошибка соединения с сервером');
        } finally {
          setLoading(false);
        }
      };

      const handleUnlinkEmail = async () => {
        if (!confirm('Вы уверены, что хотите отвязать email?')) return;
        setLoading(true);
        try {
          const response = await fetch(`${API_URL}/users/unlink-email`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              telegram_id: USER_TELEGRAM_ID
            })
          });
          if (response.ok) {
            setIsEmailLinked(false);
            setEmail('');
            alert('✅ Email отвязан');
            if (onRefresh) onRefresh();
          }
        } catch (err) {
          alert('❌ Ошибка');
        } finally {
          setLoading(false);
        }

        setNotifications(!notifications);

                <span style={{background: 'rgba(255,255,255,0.08)', color: 'white', width: '28px', height: '28px', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '14px', fontWeight: 800, flexShrink: 0, marginTop: '2px', border: '1px solid rgba(255,255,255,0.1)'}}>2</span>
                <div style={{flex: 1}}>
                  <h3 style={{fontSize: '15px', fontWeight: 700, margin: '0 0 4px'}}>Добавьте подписку</h3>
                  <p style={{fontSize: '12px', opacity: 0.5, margin: '0 0 12px', lineHeight: 1.4}}>Скопируйте ссылку и вставьте её вручную в приложение</p>
                  <div style={{background: 'rgba(0,0,0,0.3)', borderRadius: '12px', padding: '10px 14px', marginBottom: '12px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '8px', border: '1px solid rgba(255,255,255,0.04)'}}>
                    <span style={{fontSize: '11px', opacity: 0.7, wordBreak: 'break-all', fontFamily: 'monospace'}}>{subscribeUrl}</span>
                    <button onClick={copyToClipboard} style={{padding: '6px 14px', borderRadius: '8px', background: copied ? 'rgba(0, 230, 118, 0.2)' : 'rgba(0, 212, 255, 0.15)', border: copied ? '1px solid rgba(0, 230, 118, 0.3)' : '1px solid rgba(0, 212, 255, 0.2)', color: copied ? '#00E676' : '#00D4FF', fontSize: '12px', fontWeight: 600, cursor: 'pointer', whiteSpace: 'nowrap', transition: 'all 0.3s'}}>{copied ? '✅ Скопировано' : '📋 Копировать'}</button>
                  </div>
                  <button style={{width: '100%', padding: '12px', borderRadius: '14px', background: 'rgba(0, 212, 255, 0.08)', color: '#00D4FF', fontWeight: 600, border: '1.5px dashed rgba(0, 212, 255, 0.3)', cursor: 'pointer', fontSize: '13px', transition: 'all 0.3s'}}>➕ Добавить подписку</button>
                </div>
              </div>
            </div>

            <div className="glass anim-up" style={{padding: '20px', marginBottom: '16px'}}>
              <div style={{display: 'flex', alignItems: 'flex-start', gap: '12px'}}>
                <span style={{background: 'rgba(0, 230, 118, 0.2)', color: '#00E676', width: '28px', height: '28px', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '14px', fontWeight: 800, flexShrink: 0, marginTop: '2px', border: '1px solid rgba(0, 230, 118, 0.2)'}}>✓</span>
                <div style={{flex: 1}}>
                  <h3 style={{fontSize: '15px', fontWeight: 700, margin: '0 0 4px', color: '#00E676'}}>Настройка завершена</h3>
                  <p style={{fontSize: '12px', opacity: 0.5, margin: 0, lineHeight: 1.4}}>VPN подключен — пользуйтесь интернетом без ограничений</p>
                </div>
              </div>
            </div>

            <div className="glass" style={{padding: '14px 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between'}}>
              <div style={{display: 'flex', alignItems: 'center', gap: '10px'}}>
                <span style={{fontSize: '24px'}}>🤖</span>
                <div>
                  <p style={{fontSize: '13px', fontWeight: 600, margin: 0}}>Наш бот</p>
                  <p style={{fontSize: '11px', opacity: 0.4, margin: 0}}>{botUsername}</p>
                </div>
              </div>
              <button onClick={openBot} style={{padding: '8px 16px', borderRadius: '12px', background: 'linear-gradient(135deg, #00D4FF, #0080FF)', color: '#000', fontWeight: 600, border: 'none', cursor: 'pointer', fontSize: '12px'}}>Перейти →</button>
            </div>

          </div>
        </div>
      );
    }

    // ===== APP =====
    function App() {
      const [page, setPage] = useState('home');
      const [history, setHistory] = useState([]);
      const [userData, setUserData] = useState(null);
      const [refreshTrigger, setRefreshTrigger] = useState(0);

      const go = (p) => { setHistory([...history, page]); setPage(p); };
      const back = () => { if (history.length > 0) { setPage(history[history.length - 1]); setHistory(history.slice(0, -1)); } };
      
      const refreshUserData = async () => {
        try {
          const response = await fetch(`${API_URL}/users/${USER_TELEGRAM_ID}`);
          if (response.ok) {
            const data = await response.json();
            setUserData(data);
            setRefreshTrigger(prev => prev + 1);
          }
        } catch (err) {
          console.error('Ошибка обновления:', err);
        }
      };

      useEffect(() => {
        refreshUserData();
      }, []);

      return (
        <div key={page}>
          {page === 'home' && <Home 
            onPay={() => go('subscription')}
            onSettings={() => go('settings')}
            onInvite={() => go('referral')}
            onSupport={() => go('support')}
            onVpnSetup={() => go('vpnsetup')}
            userData={userData}
            onRefresh={refreshUserData}
          />}
          {page === 'subscription' && (
            <Subscription 
              onBack={back} 
              userId={userData?.id}
              onPaymentSuccess={refreshUserData}
            />
          )}
          {page === 'referral' && <Referral onBack={back} />}
          {page === 'support' && <Support onBack={back} />}
          {page === 'settings' && 
            <Settings 
              onBack={back} 
              onDocuments={() => go('documents')}
              onSubscription={() => go('subscription')}
              onDevices={() => go('devices')}
              userData={userData}
              onRefresh={refreshUserData}
            />
          }
          {page === 'devices' && <Devices onBack={back} onAddDevice={() => go('vpnsetup')} />}
          {page === 'documents' && <Documents onBack={back} />}
          {page === 'vpnsetup' && <VpnSetup onBack={back} />}
          <BottomNav current={page} onChange={go} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
